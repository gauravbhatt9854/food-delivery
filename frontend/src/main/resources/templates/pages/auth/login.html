<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FoodDesk — Sign In</title>
    <link rel="stylesheet" href="/css/pages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
    <script src="/js/pages/login.js" defer></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="login-header">
                <div class="logo">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span>FoodDesk</span>
                </div>
                <h1>Welcome back</h1>
                <p>Sign in to your account to continue</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                            autocomplete="email"
                        >
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M16 12a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 100 14 7 7 0 0014 0z"/>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" id="passwordToggle" class="password-toggle">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="/forgot-password" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary btn-full">
                    Sign In
                </button>
            </form>

            <!-- Footer Links -->
            <div class="login-footer">
                <p>Don't have an account? <a href="/register" class="register-link">Sign up</a></p>
                <p class="copyright">© 2024 FoodDesk. All rights reserved.</p>
            </div>
        </div>
    </div>

    <style>
        /* Login Page Specific Styles */
        .login-page {
            background: linear-gradient(135deg, var(--color-sage), var(--color-mint));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-elevated);
            padding: 40px;
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
            color: var(--color-sage);
        }

        .logo span {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--color-text-secondary);
            font-size: 14px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-primary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            font-size: 14px;
            font-family: var(--font-body);
            background: var(--color-surface);
            color: var(--color-text-primary);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--color-sage);
            box-shadow: 0 0 0 3px hsla(111, 35%, 55%, 0.1);
        }

        .input-wrapper svg {
            position: absolute;
            right: 16px;
            width: 20px;
            height: 20px;
            color: var(--color-text-tertiary);
        }

        .password-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }

        .checkbox-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--color-text-secondary);
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            display: none;
        }

        .checkmark {
            width: 18px;
            height: 18px;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            position: relative;
            transition: all var(--transition);
        }

        .checkbox-label input[type="checkbox"]:checked + .checkmark {
            background: var(--color-sage);
            border-color: var(--color-sage);
        }

        .checkbox-label input[type="checkbox"]:checked + .checkmark::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
        }

        .forgot-link, .register-link {
            color: var(--color-sage);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition);
        }

        .forgot-link:hover, .register-link:hover {
            color: var(--color-accent-deep);
        }

        .btn-full {
            width: 100%;
            justify-content: center;
        }

        .login-footer {
            text-align: center;
            margin-top: 32px;
        }

        .login-footer p {
            font-size: 13px;
            color: var(--color-text-tertiary);
            margin-bottom: 8px;
        }

        .copyright {
            font-size: 12px;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: var(--color-error);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                margin: 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .input-wrapper input {
                padding: 10px 14px;
            }
        }
    </style>
</body>
</html>
