<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message - Food Service</title>
    <link rel="stylesheet" href="/css/orders/orders.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/orders/orders.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <!-- Sidebar -->
        <div th:replace="~{fragments/orders/sidebar :: sidebar}"></div>

        <!-- Main Content -->
        <main class="main">
            <!-- Top Bar -->
            <div th:replace="~{fragments/orders/topbar :: topbar}"></div>

            <!-- Content Area -->
            <div class="content">
                <!-- Message Container -->
                <div class="message-container">
                    <div class="message-card">
                        <div class="message-icon">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="message-content">
                            <h1 class="message-title" th:text="${title != null ? title : 'Welcome'}">Welcome</h1>
                            <p class="message-text" th:text="${message != null ? message : 'Your message will appear here.'}">
                                Your message will appear here. This is a beautifully centered message area with excellent typography.
                            </p>
                            <div class="message-meta" th:if="${timestamp != null}">
                                <span class="message-time" th:text="${timestamp}">Just now</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <style>
        /* Message Page Specific Styles */
        .message-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 180px);
            padding: 40px 20px;
        }

        .message-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 48px;
            box-shadow: var(--shadow-elevated);
            text-align: center;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .message-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--color-sage), var(--color-sage-light), var(--color-mint));
        }

        .message-icon {
            width: 80px;
            height: 80px;
            background: var(--color-accent-glow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            border: 2px solid var(--color-sage-light);
        }

        .message-icon svg {
            width: 36px;
            height: 36px;
            color: var(--color-sage);
        }

        .message-content {
            position: relative;
            z-index: 1;
        }

        .message-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 16px;
            letter-spacing: -0.8px;
            line-height: 1.2;
            font-family: var(--font-display);
        }

        .message-text {
            font-size: 18px;
            font-weight: 400;
            color: var(--color-text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
            font-family: var(--font-body);
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--color-border-soft);
        }

        .message-time {
            font-size: 14px;
            color: var(--color-text-tertiary);
            font-weight: 500;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .message-container {
                min-height: calc(100vh - 140px);
                padding: 20px 16px;
            }

            .message-card {
                padding: 32px 24px;
            }

            .message-title {
                font-size: 28px;
            }

            .message-text {
                font-size: 16px;
            }

            .message-icon {
                width: 64px;
                height: 64px;
                margin-bottom: 24px;
            }

            .message-icon svg {
                width: 28px;
                height: 28px;
            }
        }

        /* Animation */
        .message-card {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hover Effects */
        .message-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px hsla(0,0%,0%,0.08), 0 16px 64px hsla(0,0%,0%,0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .message-icon:hover {
            transform: scale(1.05);
            background: var(--color-mint);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</body>
</html>
