<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FoodDesk — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">

    <style>
        /* ─── THEME VARIABLES (mirrors dashboard) ──────────────────────── */
        :root {
          --color-sage:        hsl(111, 22%, 58%);
          --color-sage-light:  hsl(111, 34%, 67%);
          --color-mint:        hsl(111, 48%, 83%);
          --color-cream:       hsl(68,  66%, 91%);

          --color-bg:          hsl(0, 0%, 97%);
          --color-surface:     hsl(0, 0%, 100%);
          --color-surface-2:   hsl(111, 20%, 97%);
          --color-border:      hsl(111, 15%, 90%);
          --color-border-soft: hsl(111, 10%, 94%);

          --color-text-primary:   hsl(0, 0%, 10%);
          --color-text-secondary: hsl(0, 0%, 45%);
          --color-text-tertiary:  hsl(0, 0%, 65%);

          --color-accent:      var(--color-sage);
          --color-accent-glow: hsla(111, 22%, 58%, 0.18);
          --color-accent-deep: hsl(111, 22%, 48%);

          --color-error:       hsl(0, 68%, 58%);
          --color-error-bg:    hsl(0, 80%, 97%);
          --color-error-glow:  hsla(0, 68%, 58%, 0.14);

          --color-success:     hsl(111, 35%, 48%);
          --color-success-bg:  hsl(111, 40%, 96%);

          --radius-xl:  20px;
          --radius-lg:  14px;
          --radius-md:  10px;
          --radius-sm:  7px;

          --shadow-card:     0 1px 3px hsla(0,0%,0%,0.06), 0 4px 16px hsla(0,0%,0%,0.04);
          --shadow-elevated: 0 4px 24px hsla(0,0%,0%,0.08), 0 1px 4px hsla(0,0%,0%,0.04);

          --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
          --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ─── RESET ─────────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: var(--font-body);
          background: var(--color-bg);
          color: var(--color-text-primary);
          -webkit-font-smoothing: antialiased;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          position: relative;
          overflow: hidden;
          padding: 20px;
        }
        
        /* Desktop body adjustments */
        @media (min-width: 768px) {
          body {
            padding: 40px;
          }
        }
        
        @media (min-width: 1024px) {
          body {
            padding: 60px;
          }
        }

        /* ─── BACKGROUND BLOBS ───────────────────────────────────────────── */
        .bg-layer {
          position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }

        .blob {
          position: absolute;
          border-radius: 50%;
          filter: blur(80px);
          opacity: 0.45;
        }

        .blob-1 {
          width: 480px; height: 480px;
          background: var(--color-mint);
          top: -120px; right: -80px;
          animation: drift1 14s ease-in-out infinite;
        }

        .blob-2 {
          width: 320px; height: 320px;
          background: var(--color-cream);
          bottom: -60px; left: -60px;
          animation: drift2 18s ease-in-out infinite;
        }

        .blob-3 {
          width: 200px; height: 200px;
          background: var(--color-sage-light);
          top: 55%; left: 60%;
          opacity: 0.25;
          animation: drift3 22s ease-in-out infinite;
        }

        @keyframes drift1 {
          0%,100% { transform: translate(0,0) scale(1); }
          33%      { transform: translate(-30px,20px) scale(1.05); }
          66%      { transform: translate(20px,-15px) scale(0.97); }
        }

        @keyframes drift2 {
          0%,100% { transform: translate(0,0) scale(1); }
          40%      { transform: translate(25px,-20px) scale(1.08); }
          70%      { transform: translate(-10px,15px) scale(0.96); }
        }

        @keyframes drift3 {
          0%,100% { transform: translate(0,0); }
          50%      { transform: translate(-30px,-20px); }
        }

        /* subtle dot grid */
        .bg-grid {
          position: fixed; inset: 0; z-index: 0; pointer-events: none;
          background-image: radial-gradient(circle, hsl(111,15%,80%) 1px, transparent 1px);
          background-size: 28px 28px;
          opacity: 0.35;
        }

        /* ─── CARD ───────────────────────────────────────────────────────── */
        .card-wrap {
          position: relative; z-index: 1;
          width: 100%; max-width: 480px;
          padding: 20px;
        }
        
        /* Desktop-specific styles */
        @media (min-width: 768px) {
          .card-wrap {
            max-width: 520px;
            padding: 24px;
          }
        }
        
        @media (min-width: 1024px) {
          .card-wrap {
            max-width: 560px;
            padding: 32px;
          }
        }

        .card {
          background: var(--color-surface);
          border: 1px solid var(--color-border);
          border-radius: var(--radius-xl);
          box-shadow: var(--shadow-elevated);
          padding: 40px 36px 36px;
          animation: cardIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
          min-height: 600px;
          display: flex;
          flex-direction: column;
        }
        
        /* Desktop card adjustments */
        @media (min-width: 768px) {
          .card {
            padding: 48px 42px 42px;
            min-height: 650px;
          }
        }
        
        @media (min-width: 1024px) {
          .card {
            padding: 56px 48px 48px;
            min-height: 700px;
          }
        }

        @keyframes cardIn {
          from { opacity: 0; transform: translateY(20px) scale(0.98); }
          to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ─── LOGO AREA ──────────────────────────────────────────────────── */
        .logo-area {
          display: flex; align-items: center; gap: 12px;
          margin-bottom: 32px;
          animation: fadeUp 0.5s 0.1s both;
        }

        .logo-mark {
          width: 42px; height: 42px;
          background: var(--color-sage);
          border-radius: 13px;
          display: flex; align-items: center; justify-content: center;
          box-shadow: 0 4px 14px var(--color-accent-glow);
        }

        .logo-mark svg { width: 22px; height: 22px; color: #fff; }

        .logo-text { line-height: 1; }
        .logo-name {
          font-size: 18px; font-weight: 700;
          letter-spacing: -0.4px;
          color: var(--color-text-primary);
        }
        .logo-tagline {
          font-size: 11.5px; color: var(--color-text-tertiary);
          margin-top: 2px; font-weight: 400;
        }

        /* ─── HEADING ────────────────────────────────────────────────────── */
        .heading-area {
          margin-bottom: 28px;
          animation: fadeUp 0.5s 0.15s both;
        }

        .heading {
          font-size: 24px; font-weight: 700;
          letter-spacing: -0.6px;
          color: var(--color-text-primary);
        }

        .heading-sub {
          font-size: 13.5px; color: var(--color-text-secondary);
          margin-top: 5px; font-weight: 400;
        }

        /* ─── FORM ───────────────────────────────────────────────────────── */
        .form-group {
          margin-bottom: 20px;
          animation: fadeUp 0.5s 0.2s both;
        }
        
        /* Desktop form adjustments */
        @media (min-width: 768px) {
          .form-group {
            margin-bottom: 24px;
          }
        }

        .form-group:nth-child(2) { animation-delay: 0.25s; }

        .field-label {
          display: block;
          font-size: 12px; font-weight: 600;
          color: var(--color-text-secondary);
          letter-spacing: 0.03em;
          margin-bottom: 7px;
        }

        .input-wrap {
          position: relative;
        }

        .input-icon {
          position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
          width: 16px; height: 16px;
          color: var(--color-text-tertiary);
          transition: color var(--transition);
          pointer-events: none;
        }

        .input-field {
          width: 100%;
          padding: 14px 42px 14px 40px;
          border: 1.5px solid var(--color-border);
          border-radius: var(--radius-md);
          font-size: 15px;
          font-family: var(--font-body);
          background: var(--color-surface-2);
          color: var(--color-text-primary);
          outline: none;
          transition: all var(--transition);
        }
        
        /* Desktop input adjustments */
        @media (min-width: 768px) {
          .input-field {
            padding: 16px 42px 16px 40px;
            font-size: 16px;
          }
        }

        .input-field::placeholder { color: var(--color-text-tertiary); }

        .input-field:focus {
          border-color: var(--color-sage);
          box-shadow: 0 0 0 3.5px var(--color-accent-glow);
          background: var(--color-surface);
        }

        .input-field:focus + .input-icon,
        .input-wrap:focus-within .input-icon { color: var(--color-sage); }

        /* Reorder icon to appear after input in DOM for sibling trick */
        .input-wrap { display: flex; align-items: center; }
        .input-wrap .input-field { order: 1; }
        .input-wrap .input-icon-left { order: 0; position: absolute; left: 13px; pointer-events: none; transition: color var(--transition); }
        .input-wrap .input-icon-right { order: 2; position: absolute; right: 13px; pointer-events: all; cursor: pointer; transition: color var(--transition); }
        .input-wrap:focus-within .input-icon-left { color: var(--color-sage); }
        .input-wrap:focus-within .input-icon-right { color: var(--color-sage); }

        /* password show/hide */
        .toggle-pw {
          position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
          width: 16px; height: 16px;
          color: var(--color-text-tertiary);
          cursor: pointer;
          transition: color var(--transition);
          background: none; border: none; padding: 0;
          display: flex; align-items: center; justify-content: center;
        }
        .toggle-pw:hover { color: var(--color-text-primary); }
        .toggle-pw svg { width: 16px; height: 16px; }

        /* ─── ERROR / SUCCESS BANNERS ────────────────────────────────────── */
        .banner {
          display: flex; align-items: center; gap: 9px;
          padding: 11px 14px;
          border-radius: var(--radius-md);
          font-size: 13px; font-weight: 500;
          margin-bottom: 18px;
          opacity: 0; max-height: 0; overflow: hidden;
          transition: opacity 250ms, max-height 300ms, margin 250ms;
        }

        .banner.show { opacity: 1; max-height: 80px; }

        .banner svg { width: 15px; height: 15px; flex-shrink: 0; }

        .banner-error {
          background: var(--color-error-bg);
          border: 1px solid hsl(0,68%,88%);
          color: var(--color-error);
        }

        .banner-success {
          background: var(--color-success-bg);
          border: 1px solid hsl(111,40%,82%);
          color: var(--color-success);
        }

        /* field-level error */
        .field-error {
          font-size: 11.5px; color: var(--color-error);
          margin-top: 5px;
          display: none; align-items: center; gap: 4px;
        }

        .field-error.show { display: flex; }
        .field-error svg { width: 11px; height: 11px; }

        .input-field.has-error {
          border-color: var(--color-error);
          box-shadow: 0 0 0 3px var(--color-error-glow);
        }

        /* ─── SUBMIT BUTTON ──────────────────────────────────────────────── */
        .btn-login {
          width: 100%;
          padding: 15px;
          background: var(--color-sage);
          color: #fff;
          border: none;
          border-radius: var(--radius-md);
          font-size: 15px;
          font-weight: 600;
          font-family: var(--font-body);
          cursor: pointer;
          letter-spacing: -0.1px;
          transition: all var(--transition);
          display: flex; align-items: center; justify-content: center; gap: 8px;
          position: relative; overflow: hidden;
          margin-top: 12px;
          animation: fadeUp 0.5s 0.3s both;
        }
        
        /* Desktop button adjustments */
        @media (min-width: 768px) {
          .btn-login {
            padding: 18px;
            font-size: 16px;
            margin-top: 16px;
          }
        }

        .btn-login:hover:not(:disabled) {
          background: var(--color-accent-deep);
          box-shadow: 0 6px 20px var(--color-accent-glow);
          transform: translateY(-1px);
        }

        .btn-login:active:not(:disabled) { transform: translateY(0); }

        .btn-login:disabled {
          opacity: 0.65; cursor: not-allowed;
        }

        /* loading spinner */
        .btn-login .spinner {
          width: 16px; height: 16px;
          border: 2px solid hsla(0,0%,100%,0.4);
          border-top-color: #fff;
          border-radius: 50%;
          display: none;
          animation: spin 0.7s linear infinite;
        }

        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { opacity: 0.7; }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        /* checkmark on success */
        .btn-login .check-icon { display: none; }
        .btn-login.success { background: var(--color-success); pointer-events: none; }
        .btn-login.success .check-icon { display: block; }
        .btn-login.success .btn-text { display: none; }
        .btn-login.success .spinner { display: none; }

        /* ─── DIVIDER ────────────────────────────────────────────────────── */
        .divider {
          display: flex; align-items: center; gap: 12px;
          margin: 22px 0 18px;
          animation: fadeUp 0.5s 0.32s both;
        }

        .divider-line { flex: 1; height: 1px; background: var(--color-border-soft); }
        .divider-text { font-size: 11.5px; color: var(--color-text-tertiary); white-space: nowrap; }

        /* ─── HINT CHIPS (test credentials) ─────────────────────────────── */
        .hint-label {
          font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
          text-transform: uppercase; color: var(--color-text-tertiary);
          margin-bottom: 8px;
          animation: fadeUp 0.5s 0.35s both;
        }

        .hint-chips {
          display: flex; gap: 8px; flex-wrap: wrap;
          animation: fadeUp 0.5s 0.38s both;
        }

        .hint-chip {
          display: inline-flex; align-items: center; gap: 6px;
          padding: 7px 12px;
          background: var(--color-surface-2);
          border: 1px solid var(--color-border);
          border-radius: var(--radius-md);
          cursor: pointer;
          transition: all var(--transition);
          font-size: 12.5px; font-weight: 500;
          color: var(--color-text-secondary);
        }

        .hint-chip:hover {
          background: var(--color-mint);
          border-color: var(--color-sage-light);
          color: var(--color-text-primary);
        }

        .hint-chip svg { width: 12px; height: 12px; color: var(--color-sage); flex-shrink: 0; }

        .chip-name { font-weight: 600; color: var(--color-text-primary); }
        .chip-role {
          font-size: 11px; color: var(--color-text-tertiary);
          background: var(--color-border-soft);
          border-radius: 4px; padding: 1px 6px;
        }

        /* ─── FOOTER ─────────────────────────────────────────────────────── */
        .card-footer {
          text-align: center;
          margin-top: 24px;
          font-size: 12px; color: var(--color-text-tertiary);
          animation: fadeUp 0.5s 0.4s both;
        }

        /* ─── KEYFRAMES ─────────────────────────────────────────────────── */
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(10px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── SHAKE ──────────────────────────────────────────────────────── */
        @keyframes shake {
          0%,100% { transform: translateX(0); }
          20%     { transform: translateX(-6px); }
          40%     { transform: translateX(6px); }
          60%     { transform: translateX(-4px); }
          80%     { transform: translateX(4px); }
        }

        .shake { animation: shake 0.38s cubic-bezier(0.36,0.07,0.19,0.97) both; }

        /* ─── SCROLLBAR ─────────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 99px; }
    </style>
</head>

<body>

<!-- Background -->
<div class="bg-grid"></div>
<div class="bg-layer">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<!-- Login Card -->
<div class="card-wrap">
    <div class="card" id="login-card">

        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-mark">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
            </div>
            <div class="logo-text">
                <div class="logo-name">Food Service</div>
                <div class="logo-tagline">Admin Dashboard</div>
            </div>
        </div>

        <!-- Heading -->
        <div class="heading-area">
            <div class="heading">Welcome back</div>
            <div class="heading-sub">Sign in to manage food service</div>
        </div>

        <!-- Error / Success banners -->
        <div class="banner banner-error" id="banner-error" role="alert">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="banner-error-text">Invalid username or password.</span>
        </div>

        <div class="banner banner-success" id="banner-success" role="status">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>Login successful! Redirecting…</span>
        </div>

        <!-- Thymeleaf form -->
        <form id="login-form" th:action="@{/auth/login}" method="post" th:csrf="true" novalidate>

            <!-- CSRF (Spring Security) - automatically added by th:csrf -->

            <!-- Username -->
            <div class="form-group">
                <label class="field-label" for="username">Username</label>
                <div class="input-wrap" style="position:relative;">
                    <svg class="input-icon-left" style="position:absolute;left:13px;width:16px;height:16px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input
                            class="input-field"
                            id="username"
                            name="username"
                            type="text"
                            placeholder="Enter your username"
                            autocomplete="username"
                            style="padding-left:40px;"
                            oninput="clearFieldError('username')"
                    />
                </div>
                <div class="field-error" id="err-username">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Username is required
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="field-label" for="password">Password</label>
                <div class="input-wrap" style="position:relative;">
                    <svg class="input-icon-left" style="position:absolute;left:13px;width:16px;height:16px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <input
                            class="input-field"
                            id="password"
                            name="password"
                            type="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            style="padding-left:40px; padding-right:40px;"
                            oninput="clearFieldError('password')"
                    />
                    <button type="button" class="toggle-pw" id="toggle-pw" onclick="togglePassword()" title="Show/hide password">
                        <svg id="eye-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="field-error" id="err-password">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Password is required
                </div>
            </div>

            <!-- Submit -->
            <button class="btn-login" id="btn-login" type="submit">
                <div class="spinner"></div>
                <svg class="check-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                <span class="btn-text">Sign In</span>
            </button>

        </form>

        <!-- Test credentials section -->
        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">Accounts</div>
            <div class="divider-line"></div>
        </div>


        <!-- Footer -->
        <div class="card-footer">
            FoodDesk v1.0 &nbsp;·&nbsp; &copy; 2026 Internal Admin Tool
        </div>

    </div>
</div>

<script>
    /* ── SHOW / HIDE PASSWORD ──────────────────────────────────────────── */
    let pwVisible = false;

    function togglePassword() {
      pwVisible = !pwVisible;
      const inp = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      inp.type = pwVisible ? 'text' : 'password';
      icon.innerHTML = pwVisible
        ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }

    /* ── AUTO-FILL TEST CREDENTIALS ───────────────────────────────────── */
    function fillCredentials(user, pass) {
      const uField = document.getElementById('username');
      const pField = document.getElementById('password');

      // Animate value typing
      typeInto(uField, user, () => typeInto(pField, pass));

      // Clear any errors
      clearFieldError('username');
      clearFieldError('password');
      hideBanner('banner-error');
    }

    function typeInto(el, text, callback) {
      el.value = '';
      el.focus();
      let i = 0;
      const interval = setInterval(() => {
        el.value += text[i++];
        if (i >= text.length) {
          clearInterval(interval);
          if (callback) setTimeout(callback, 120);
        }
      }, 55);
    }

    /* ── FIELD ERRORS ─────────────────────────────────────────────────── */
    function clearFieldError(field) {
      document.getElementById('err-' + field).classList.remove('show');
      document.getElementById(field).classList.remove('has-error');
      hideBanner('banner-error');
    }

    function showFieldError(field) {
      const inp = document.getElementById(field);
      const err = document.getElementById('err-' + field);
      inp.classList.add('has-error');
      err.classList.add('show');
    }

    /* ── BANNERS ──────────────────────────────────────────────────────── */
    function showBanner(id) {
      document.getElementById(id).classList.add('show');
    }

    function hideBanner(id) {
      document.getElementById(id).classList.remove('show');
    }

    /* ── FORM SUBMIT ──────────────────────────────────────────────────── */
    // Demo credentials (remove in production — Thymeleaf/Spring handles real auth)
    const DEMO_USERS = {
      admin:   'admin123',
      manager: 'mgr456',
      viewer:  'view789',
    };

    function handleSubmit(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn-login');

      // Clear previous state
      hideBanner('banner-error');
      hideBanner('banner-success');
      clearFieldError('username');
      clearFieldError('password');

      // Validate
      let valid = true;
      if (!username) { showFieldError('username'); valid = false; }
      if (!password) { showFieldError('password'); valid = false; }
      if (!valid) {
        document.getElementById('login-card').classList.add('shake');
        setTimeout(() => document.getElementById('login-card').classList.remove('shake'), 400);
        return false;
      }

      // Loading state
      btn.classList.add('loading');
      btn.disabled = true;

      // Simulate auth (replace with real form submit for Spring Security)
      setTimeout(() => {
        btn.classList.remove('loading');

        const isValid = DEMO_USERS[username] === password;

        if (isValid) {
          btn.classList.add('success');
          showBanner('banner-success');
          // In production: e.target.submit();
          setTimeout(() => {
            // window.location.href = '/dashboard';
            showBanner('banner-success');
          }, 1200);
        } else {
          btn.disabled = false;
          // Identify wrong field
          if (!DEMO_USERS[username]) {
            showFieldError('username');
            document.getElementById('banner-error-text').textContent = 'No account found for that username.';
          } else {
            showFieldError('password');
            document.getElementById('banner-error-text').textContent = 'Incorrect password. Please try again.';
          }
          showBanner('banner-error');
          document.getElementById('login-card').classList.add('shake');
          setTimeout(() => document.getElementById('login-card').classList.remove('shake'), 400);
          // Re-focus the wrong field
          const wrongField = !DEMO_USERS[username] ? 'username' : 'password';
          document.getElementById(wrongField).focus();
        }
      }, 900);

      return false;
    }

    /* ── ENTER KEY submits ─────────────────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const active = document.activeElement;
        if (active && (active.id === 'username' || active.id === 'password')) {
          handleSubmit(new Event('submit'));
        }
      }
    });
</script>
