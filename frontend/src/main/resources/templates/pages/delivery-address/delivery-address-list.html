<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Basic Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addresses</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind -->
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>

<body class="bg-gray-100 font-[Inter]">

<!-- 🔹 Back Button -->
<div class="max-w-5xl mx-auto mt-6 px-4">
    <button onclick="window.history.back()"
            class="flex items-center gap-2 bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg shadow">
        <i class="fa fa-arrow-left"></i> Back
    </button>
</div>

<!-- 🔹 Heading -->
<div class="max-w-5xl mx-auto mt-4 px-4">
    <h2 class="text-2xl font-semibold text-gray-800 flex items-center gap-2">
        <i class="fa fa-location-dot text-blue-500"></i>
        <span th:text="'Addresses in ' + ${city}"></span>
    </h2>
</div>

<!-- 🔹 Cards -->
<div class="max-w-5xl mx-auto mt-6 px-4 grid gap-4">

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-lg transition cursor-pointer"
         th:each="a : ${addresses}"
         th:onclick="'window.location.href=\'/delivery-address/' + ${a.id} + '\''">

        <p class="text-gray-700 mb-2">
            <strong><i class="fa fa-road text-gray-500"></i> Address:</strong>
            <span th:text="${a.addressLine1}"></span>
        </p>

        <p th:if="${a.addressLine2}" class="text-gray-700 mb-2">
            <i class="fa fa-road text-gray-500"></i>
            <span th:text="${a.addressLine2}"></span>
        </p>

        <p class="text-gray-700 mb-1">
            <strong><i class="fa fa-city text-gray-500"></i> City:</strong>
            <span th:text="${a.city}"></span>
        </p>

        <p class="text-gray-700 mb-1">
            <strong><i class="fa fa-map text-gray-500"></i> State:</strong>
            <span th:text="${a.state}"></span>
        </p>

        <p class="text-gray-700">
            <strong><i class="fa fa-envelope text-gray-500"></i> Pincode:</strong>
            <span th:text="${a.postalCode}"></span>
        </p>

    </div>

</div>

</body>
</html>
