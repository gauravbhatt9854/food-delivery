<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Basic Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Analytics</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Your CSS -->
    <link rel="stylesheet" th:href="@{/css/customer/analytics.css}">

    <!-- JS -->
    <script th:src="@{/js/customer/analytics.js}" defer></script>
</head>

<body>

<button onclick="window.history.back()">
    <i class="fa fa-arrow-left"></i> Back
</button>

<h2><i class="fa fa-chart-line"></i> Customer Analytics</h2>

<div class="container">

    <div class="card">
        <h3><i class="fa fa-box"></i> Total Orders</h3>
        <p th:text="${analytics.totalOrders}"></p>
    </div>

    <div class="card">
        <h3><i class="fa fa-indian-rupee-sign"></i> Total Spend</h3>
        <p>₹ <span th:text="${analytics.totalSpend}"></span></p>
    </div>

    <div class="card">
        <h3><i class="fa fa-calculator"></i> Average Order Value</h3>
        <p>₹ <span th:text="${analytics.avgOrderValue}"></span></p>
    </div>

</div>

</body>
</html>
