<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Basic Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Addresses</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- JS -->
    <script th:src="@{/js/customer/addresses.js}" defer></script>
</head>

<body class="bg-gray-100 font-[Inter]">

<!-- Back Button -->
<div class="p-4">
    <button onclick="window.history.back()"
            class="flex items-center gap-2 px-4 py-2 bg-gray-800 text-white rounded-lg shadow hover:bg-gray-700 transition">
        <i class="fa fa-arrow-left"></i> Back
    </button>
</div>

<!-- Heading -->
<h2 class="text-2xl font-semibold text-center text-gray-800 mb-6">
    <i class="fa fa-location-dot text-blue-500"></i> Customer Addresses
</h2>

<!-- Container -->
<div class="max-w-5xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- Card -->
    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-lg transition"
         th:each="a : ${addresses}">

        <p class="text-sm text-gray-700 mb-2">
            <strong><i class="fa fa-road text-blue-500"></i> Address Line1:</strong>
            <span th:text="${a.addressLine1}"></span>
        </p>

        <p class="text-sm text-gray-700 mb-2">
            <strong><i class="fa fa-road text-blue-500"></i> Address Line2:</strong>
            <span th:text="${a.addressLine2}"></span>
        </p>

        <p class="text-sm text-gray-700 mb-2">
            <strong><i class="fa fa-city text-green-500"></i> City:</strong>
            <span th:text="${a.city}"></span>
        </p>

        <p class="text-sm text-gray-700 mb-2">
            <strong><i class="fa fa-map text-purple-500"></i> State:</strong>
            <span th:text="${a.state}"></span>
        </p>

        <p class="text-sm text-gray-700">
            <strong><i class="fa fa-envelope text-red-500"></i> Pincode:</strong>
            <span th:text="${a.postalCode}"></span>
        </p>

    </div>

</div>

</body>
</html>
