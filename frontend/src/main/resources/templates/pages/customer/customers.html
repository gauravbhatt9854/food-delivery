<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Basic Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Sidebar CSS -->
    <link rel="stylesheet" href="/css/orders/orders.css">

    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            margin: 0;
            color: var(--text-primary);
        }

        .app-shell { display: flex; min-height: 100vh; }

        .main {
            flex: 1;
            margin-left: 280px;
            padding: 2.5rem;
            background: var(--bg-light);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: #64748b;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-md);
        }

        .back-btn:hover {
            background: #475569;
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .controls-container {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: end;
        }

        .search-container {
            display: flex;
            gap: 0.5rem;
            background: var(--card-bg);
            padding: 0.75rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .search-btn {
            padding: 0.625rem 1.25rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .page-size-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card-bg);
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .page-size-select {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background: white;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 1.25rem;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .table-container { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

        thead {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 1.25rem 1.5rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
        }

        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s;
            cursor: pointer;
        }

        tbody tr:hover {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            transform: translateX(4px);
        }

        td { padding: 1.25rem 1.5rem; }

        .table-cell-id {
            font-weight: 600;
            color: var(--primary-color);
        }

        .table-cell-name { font-weight: 600; color: var(--text-primary); }

        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .pagination-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-md);
        }

        .pagination-btn-prev { background: #64748b; color: white; }

        .pagination-btn-next { background: var(--primary-color); color: white; }

        .pagination-info {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main { margin-left: 0; padding: 1.5rem; }
            .page-header { flex-direction: column; align-items: flex-start; }
            .controls-container { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .main { padding: 1rem; }
            .page-title { font-size: 1.5rem; }
            th, td { padding: 0.75rem 1rem; }
        }
    </style>

    <script th:src="@{/js/customer/customer.js}" defer></script>
</head>

<body>
<div class="app-shell">
    <!-- Sidebar -->
    <div th:replace="~{fragments/orders/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <main class="main">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-title">
                <i class="fa fa-users" style="color: var(--primary-color); font-size: 1.8rem;"></i>
                Customer List
            </div>
            <button class="back-btn" onclick="window.history.back()">
                <i class="fa fa-arrow-left"></i> Back
            </button>
        </div>

        <!-- Controls -->
        <div class="controls-container">
            <div class="search-container">
                <input type="text" id="search" class="search-input" placeholder="🔍 Search by city...">
                <button type="button" id="searchBtn" class="search-btn">
                    <i class="fa fa-search"></i> Search
                </button>
            </div>

            <div class="page-size-container">
                <label style="font-size: 0.875rem; color: var(--text-secondary);">
                    <i class="fa fa-list"></i> Rows per page:
                </label>
                <select id="pageSize" class="page-size-select">
                    <option value="5" th:selected="${size == 5}">5</option>
                    <option value="10" th:selected="${size == 10}">10</option>
                    <option value="20" th:selected="${size == 20}">20</option>
                </select>
            </div>
        </div>

        <!-- Table Card -->
        <div class="content-card">
            <div class="table-container">
                <table>
                    <thead>
                    <tr>
                        <th><i class="fa fa-hashtag"></i> ID</th>
                        <th><i class="fa fa-user"></i> Name</th>
                        <th><i class="fa fa-envelope"></i> Email</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${customers}"
                        th:onclick="'window.location.href=\'/customers/' + ${c.customerId} + '\''">
                        <td class="table-cell-id" th:text="${c.customerId}"></td>
                        <td class="table-cell-name" th:text="${c.customerName}"></td>
                        <td th:text="${c.customerEmail}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination-container">
            <button class="pagination-btn pagination-btn-prev"
                    th:if="${currentPage > 0}"
                    th:onclick="'window.location.href=\'/customers?page=' + (${currentPage} - 1) + '&size=' + ${size} + '\''">
                <i class="fa fa-arrow-left"></i> Previous
            </button>

            <div class="pagination-info">
                <i class="fa fa-file"></i>
                Page <strong th:text="${currentPage + 1}"></strong>
            </div>

            <button class="pagination-btn pagination-btn-next"
                    th:onclick="'window.location.href=\'/customers?page=' + (${currentPage} + 1) + '&size=' + ${size} + '\''">
                Next <i class="fa fa-arrow-right"></i>
            </button>
        </div>
    </main>
</div>
</body>
</html>
