<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Basic Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- JS -->
    <script th:src="@{/js/customer/customer.js}" defer></script>
</head>

<body class="bg-gray-100 font-[Inter] p-6">

<!-- Back Button -->
<button onclick="window.history.back()"
        class="flex items-center gap-2 px-4 py-2 bg-gray-800 text-white rounded-lg shadow hover:bg-gray-700 transition mb-6">
    <i class="fa fa-arrow-left"></i> Back
</button>

<!-- Heading -->
<h2 class="text-2xl font-semibold text-gray-800 mb-6">
    <i class="fa fa-users text-blue-500"></i> Customer List
</h2>

<!-- Controls -->
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">

    <div class="flex items-center gap-2 bg-white px-3 py-2 rounded-lg shadow w-full sm:w-1/3">
        <input type="text" id="search" placeholder="Enter city..."
               class="w-full outline-none text-sm">

        <button type="button" id="searchBtn"
                class="bg-blue-500 text-white px-3 py-1 rounded-md text-sm">
            Search
        </button>
    </div>

    <!-- Page Size -->
    <div class="flex items-center gap-2">
        <label class="text-sm text-gray-700">
            <i class="fa fa-list"></i> Page Size:
        </label>
        <select id="pageSize"
                class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="5" th:selected="${size == 5}">5</option>
            <option value="10" th:selected="${size == 10}">10</option>
            <option value="20" th:selected="${size == 20}">20</option>
        </select>
    </div>

</div>

<!-- Table -->
<div class="bg-white rounded-xl shadow overflow-hidden">

    <table class="min-w-full text-sm text-left">

        <!-- Head -->
        <thead class="bg-gray-200 text-gray-700 uppercase text-xs">
        <tr>
            <th class="px-6 py-3"><i class="fa fa-hashtag"></i> Id</th>
            <th class="px-6 py-3"><i class="fa fa-user"></i> Name</th>
            <th class="px-6 py-3"><i class="fa fa-envelope"></i> Email</th>
        </tr>
        </thead>

        <!-- Body -->
        <tbody class="divide-y">

        <tr th:each="c : ${customers}"
            th:onclick="'window.location.href=\'/customers/' + ${c.customerId} + '\''"
            class="hover:bg-gray-100 cursor-pointer transition">

            <td class="px-6 py-3" th:text="${c.customerId}"></td>
            <td class="px-6 py-3 font-medium text-gray-800" th:text="${c.customerName}"></td>
            <td class="px-6 py-3 text-gray-600" th:text="${c.customerEmail}"></td>

        </tr>

        </tbody>
    </table>

</div>

<!-- Pagination -->
<div class="flex items-center justify-between mt-6">

    <!-- Prev -->
    <button
            class="px-4 py-2 bg-gray-800 text-white rounded-lg shadow hover:bg-gray-700 transition"
            th:if="${currentPage > 0}"
            th:onclick="'window.location.href=\'/customers?page=' + (${currentPage} - 1) + '&size=' + ${size} + '\''">
        <i class="fa fa-arrow-left"></i> Prev
    </button>

    <!-- Page Info -->
    <span class="text-gray-700 text-sm">
        <i class="fa fa-file"></i> Page:
        <span class="font-semibold" th:text="${currentPage}"></span>
    </span>

    <!-- Next -->
    <button
            class="px-4 py-2 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 transition"
            th:onclick="'window.location.href=\'/customers?page=' + (${currentPage} + 1) + '&size=' + ${size} + '\''">
        Next <i class="fa fa-arrow-right"></i>
    </button>

</div>

</body>
</html>
