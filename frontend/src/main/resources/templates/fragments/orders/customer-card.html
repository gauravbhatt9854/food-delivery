<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div class="customer-card" th:fragment="customer-card" th:if="${orderCustomerDTO != null}">
    <div class="customer-avatar" 
         th:text="${#strings.substring(orderCustomerDTO.customer.customerName, 0, 1) + #strings.substring(orderCustomerDTO.customer.customerName, #strings.indexOf(orderCustomerDTO.customer.customerName, ' ') + 1, #strings.indexOf(orderCustomerDTO.customer.customerName, ' ') + 2)}">JD</div>
    <div>
        <div class="customer-detail-name" th:text="${orderCustomerDTO.customer.customerName}">Jane Doe</div>
        <div class="customer-meta">
            <div class="customer-meta-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <span th:text="${orderCustomerDTO.customer.customerEmail}">email@example.com</span>
            </div>
            <div class="customer-meta-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
                <span th:text="${orderCustomerDTO.customer.customerPhone}">+91 98765 43210</span>
            </div>
        </div>
    </div>
    <div class="customer-badge" style="margin-left:auto">
        <div class="customer-badge-value" th:text="${#lists.size(orderCustomerDTO.orderDetails.content)}">12</div>
        <div class="customer-badge-label">Total Orders</div>
    </div>
</div>
</html>
