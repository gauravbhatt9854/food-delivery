<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Driver Details</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: hsl(73, 74%, 85%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: hsl(108, 24%, 58%);
            margin-bottom: 20px;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid hsl(103, 41%, 67%);
        }

        button {
            background: hsl(108, 24%, 58%);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: hsl(103, 41%, 67%);
        }

        .driver-box {
            background: hsl(102, 55%, 83%);
            padding: 15px;
            border-radius: 10px;
        }

        .driver-box p {
            margin: 5px 0;
        }

        .label {
            font-weight: bold;
            color: hsl(108, 24%, 58%);
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Driver Details</h2>

    <form method="get" action="/view/driver/order">
        <input type="number" name="orderId" placeholder="Enter Order ID" required>
        <button type="submit">Fetch</button>
    </form>

    <div class="driver-box" th:if="${driver != null}">
        <p><span class="label">ID:</span> <span th:text="${driver.driverId}"></span></p>
        <p><span class="label">Name:</span> <span th:text="${driver.driverName}"></span></p>
        <p><span class="label">Phone:</span> <span th:text="${driver.driverPhone}"></span></p>
        <p><span class="label">Vehicle:</span> <span th:text="${driver.driverVehicle}"></span></p>
    </div>

</div>

</body>
</html>
