<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Coupons</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 20px;
        }

        h2 {
            color: #84B179;
        }

        form {
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            margin-right: 10px;
        }

        button {
            padding: 8px 12px;
            background-color: #84B179;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 50%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

<h2>Order Coupons</h2>

<form th:action="@{/view/orders/coupons}" method="get">
    <input type="number" name="orderId" placeholder="Enter Order ID" required />
    <button type="submit">Fetch Coupons</button>
</form>

<div th:if="${coupons}">
    <table>
        <tr>
            <th>Code</th>
            <th>Discount</th>
        </tr>

        <tr th:each="c : ${coupons}">
            <td th:text="${c.couponCode}"></td>
            <td th:text="${c.discount}"></td>
        </tr>
    </table>
</div>

<div th:if="${error}">
    <p th:text="${error}"></p>
</div>

</body>
</html>
